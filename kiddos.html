<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Les Pharaons — Aventure en Égypte !</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5a623">
<meta name="referrer" content="no-referrer">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --sand: #fde68a;
  --sand-dark: #f5a623;
  --sky: #38bdf8;
  --sky-dark: #0284c7;
  --nile: #06b6d4;
  --gold: #f59e0b;
  --gold-deep: #d97706;
  --red: #ef4444;
  --green: #22c55e;
  --purple: #a855f7;
  --ink: #1c1917;
  --white: #fffbeb;
  --card-bg: #fff7ed;
  --shadow: 0 4px 0 rgba(0,0,0,0.15);
  --shadow-lg: 0 8px 0 rgba(0,0,0,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { font-size: 16px; }

body {
  background: #fef3c7;
  font-family: 'Nunito', 'Baloo 2', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Fond décoratif */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%, #fed7aa 0%, transparent 60%),
    radial-gradient(ellipse 60% 30% at 50% 100%, #bae6fd 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Sable en bas */
body::after {
  content: '';
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: linear-gradient(to top, #f5a623 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* Navigation principale */
.app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
  padding: 1rem 1rem 1.5rem;
  text-align: center;
  position: relative;
  box-shadow: 0 4px 0 #b45309;
}

.header-emoji {
  font-size: 2.5rem;
  line-height: 1;
  margin-bottom: 0.3rem;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  animation: wobble 3s ease-in-out infinite;
}

@keyframes wobble {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}

.header h1 {
  font-family: 'Baloo 2', sans-serif;
  font-size: clamp(1.6rem, 5vw, 2.2rem);
  font-weight: 800;
  color: white;
  text-shadow: 0 3px 0 rgba(0,0,0,0.2);
  letter-spacing: 0.02em;
}

.header p {
  color: rgba(255,255,255,0.9);
  font-size: 0.95rem;
  font-weight: 600;
  margin-top: 0.2rem;
}

/* Tabs navigation */
.tabs {
  display: flex;
  background: #b45309;
  padding: 0 0.5rem;
}

.tab-btn {
  flex: 1;
  padding: 0.75rem 0.5rem;
  background: transparent;
  border: none;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  color: rgba(255,255,255,0.7);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.2rem;
  transition: all 0.2s;
  border-bottom: 3px solid transparent;
}

.tab-btn .tab-icon { font-size: 1.4rem; }

.tab-btn.active {
  color: white;
  border-bottom-color: #fde68a;
}

/* Contenu */
.screen {
  display: none;
  flex: 1;
  padding: 1rem;
  animation: fadeSlide 0.3s ease;
}
.screen.active { display: block; }

@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* =================== FRISE =================== */

.period-nav {
  display: flex;
  gap: 0.5rem;
  overflow-x: auto;
  padding: 0.5rem 0 1rem;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.period-nav::-webkit-scrollbar { display: none; }

.period-pill {
  flex-shrink: 0;
  padding: 0.4rem 0.9rem;
  border-radius: 999px;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: var(--shadow);
  transition: transform 0.15s;
  color: white;
}
.period-pill:active { transform: scale(0.95); }

.dynasty-block {
  margin-bottom: 2rem;
  scroll-margin-top: 1rem;
}

.dynasty-title {
  background: white;
  border-radius: 16px 16px 0 0;
  padding: 0.8rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  box-shadow: var(--shadow);
}

.dynasty-emoji { font-size: 1.8rem; }

.dynasty-title-text h3 {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  color: var(--ink);
}

.dynasty-title-text p {
  font-size: 0.8rem;
  color: #78716c;
  font-weight: 600;
}

.dynasty-desc {
  background: rgba(255,255,255,0.6);
  padding: 0.6rem 1rem;
  font-size: 0.9rem;
  color: #57534e;
  font-weight: 600;
  border-left: 4px solid var(--dynasty-color, var(--gold));
  margin-bottom: 0.8rem;
}

.pharaohs-list {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}

/* Carte pharaon */
.pharaoh-card {
  background: white;
  border-radius: 16px;
  padding: 0.9rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  box-shadow: var(--shadow);
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.pharaoh-card:active { transform: scale(0.98); }

.pharaoh-card.star {
  border-color: var(--gold);
  background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
}

.pharaoh-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  background: var(--dynasty-color, var(--gold));
  border-radius: 4px 0 0 4px;
}

.pharaoh-avatar {
  width: 52px;
  height: 52px;
  border-radius: 12px;
  object-fit: cover;
  flex-shrink: 0;
  background: #f3f4f6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  overflow: hidden;
}

.pharaoh-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
}

.pharaoh-info { flex: 1; min-width: 0; }

.pharaoh-info h4 {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  color: var(--ink);
  margin-bottom: 0.1rem;
}

.pharaoh-info .reign {
  font-size: 0.78rem;
  color: #78716c;
  font-weight: 600;
}

.star-badge {
  font-size: 1.2rem;
  flex-shrink: 0;
}

/* =================== DÉTAIL PHARAON =================== */
.detail-screen {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 50;
  background: #fef3c7;
  overflow-y: auto;
  animation: slideInUp 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.1);
}

@keyframes slideInUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.detail-screen.active { display: block; }

.detail-header {
  position: relative;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 1rem;
  overflow: hidden;
}

.detail-bg {
  position: absolute;
  inset: 0;
  object-fit: cover;
  width: 100%;
  height: 100%;
}

.detail-bg-fallback {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 6rem;
}

.detail-header-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.1) 60%);
}

.detail-back {
  position: absolute;
  top: 1rem;
  left: 1rem;
  background: rgba(0,0,0,0.4);
  border: none;
  color: white;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
  z-index: 2;
}

.detail-title {
  position: relative;
  z-index: 2;
}

.detail-title h2 {
  font-family: 'Baloo 2', sans-serif;
  font-size: clamp(1.6rem, 5vw, 2rem);
  font-weight: 800;
  color: white;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.detail-title .dynasty-label {
  background: rgba(255,255,255,0.2);
  color: white;
  padding: 0.2rem 0.7rem;
  border-radius: 999px;
  font-size: 0.8rem;
  font-weight: 700;
  backdrop-filter: blur(4px);
  display: inline-block;
  margin-bottom: 0.4rem;
}

.detail-body { padding: 1.2rem 1rem 3rem; }

.detail-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 1.2rem;
}

.chip {
  background: white;
  border-radius: 999px;
  padding: 0.35rem 0.8rem;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--ink);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

.anecdote-box {
  background: white;
  border-radius: 20px;
  padding: 1.2rem;
  box-shadow: var(--shadow-lg);
  border-left: 5px solid var(--gold);
  margin-bottom: 1rem;
}

.anecdote-label {
  font-size: 0.75rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--gold-deep);
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

.anecdote-text {
  font-size: 1rem;
  line-height: 1.6;
  color: #292524;
  font-weight: 600;
}

/* Photo du monument */
.monument-section {
  margin-top: 1rem;
}

.monument-label {
  font-size: 0.75rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #78716c;
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

.monument-img-wrap {
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  background: #e7e5e4;
  min-height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.monument-img-wrap img {
  width: 100%;
  display: block;
  border-radius: 16px;
}

.monument-emoji-fallback {
  font-size: 4rem;
  padding: 2rem;
}

.monument-caption {
  font-size: 0.78rem;
  color: #78716c;
  font-weight: 600;
  margin-top: 0.4rem;
  text-align: center;
}

/* =================== QUIZ =================== */
.quiz-intro {
  text-align: center;
  padding: 1rem 0 1.5rem;
}

.quiz-intro h2 {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--ink);
  margin-bottom: 0.3rem;
}

.quiz-intro p {
  color: #78716c;
  font-weight: 600;
  font-size: 0.95rem;
  margin-bottom: 1.5rem;
}

.quiz-start-btn {
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  color: white;
  border: none;
  border-radius: 20px;
  padding: 1rem 2.5rem;
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.3rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 6px 0 #b45309;
  transition: all 0.15s;
  letter-spacing: 0.02em;
}
.quiz-start-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #b45309; }

.quiz-score-display {
  display: flex;
  justify-content: center;
  gap: 2rem;
  margin: 1rem 0;
}

.score-item {
  text-align: center;
  background: white;
  border-radius: 16px;
  padding: 0.7rem 1.5rem;
  box-shadow: var(--shadow);
}
.score-item .num {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--ink);
}
.score-item .lbl {
  font-size: 0.75rem;
  font-weight: 700;
  color: #78716c;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Question */
.quiz-question-wrap {
  background: white;
  border-radius: 24px;
  padding: 1.2rem;
  box-shadow: var(--shadow-lg);
  margin-bottom: 1rem;
}

.quiz-question-img {
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 1rem;
  min-height: 150px;
  background: #f3f4f6;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.quiz-question-img img {
  width: 100%;
  display: block;
  border-radius: 16px;
}

.quiz-question-emoji {
  font-size: 5rem;
  padding: 1rem;
}

.quiz-question-text {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.15rem;
  font-weight: 800;
  color: var(--ink);
  text-align: center;
  line-height: 1.4;
}

.quiz-type-badge {
  display: inline-block;
  background: #e0f2fe;
  color: #0369a1;
  padding: 0.2rem 0.7rem;
  border-radius: 999px;
  font-size: 0.75rem;
  font-weight: 700;
  margin-bottom: 0.6rem;
}

/* Options */
.quiz-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.7rem;
  margin-bottom: 1rem;
}

.quiz-option {
  background: white;
  border: 3px solid #e5e7eb;
  border-radius: 16px;
  padding: 0.8rem 0.6rem;
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--ink);
  cursor: pointer;
  text-align: center;
  box-shadow: var(--shadow);
  transition: all 0.15s;
  line-height: 1.3;
}

.quiz-option:active { transform: scale(0.97); }
.quiz-option.correct { background: #dcfce7; border-color: var(--green); color: #166534; }
.quiz-option.wrong { background: #fee2e2; border-color: var(--red); color: #991b1b; }
.quiz-option.reveal { background: #dcfce7; border-color: var(--green); color: #166534; opacity: 0.6; }
.quiz-option:disabled { cursor: default; }

/* Feedback */
.quiz-feedback {
  display: none;
  background: white;
  border-radius: 20px;
  padding: 1rem 1.2rem;
  box-shadow: var(--shadow);
  text-align: center;
  margin-bottom: 1rem;
}
.quiz-feedback.show { display: block; animation: popIn 0.3s cubic-bezier(0.2,0.9,0.3,1.3); }

@keyframes popIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.feedback-emoji { font-size: 3rem; margin-bottom: 0.3rem; }
.feedback-title {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.2rem;
  font-weight: 800;
  margin-bottom: 0.3rem;
}
.feedback-text { font-size: 0.9rem; font-weight: 600; color: #57534e; line-height: 1.4; }

.quiz-next-btn {
  width: 100%;
  background: linear-gradient(135deg, #06b6d4, #3b82f6);
  color: white;
  border: none;
  border-radius: 16px;
  padding: 0.9rem;
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.1rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 0 #0e7490;
  transition: all 0.15s;
}
.quiz-next-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #0e7490; }

/* Résultats quiz */
.quiz-results {
  text-align: center;
  padding: 2rem 1rem;
  animation: popIn 0.4s cubic-bezier(0.2,0.9,0.3,1.2);
}
.results-emoji { font-size: 5rem; margin-bottom: 0.5rem; }
.results-title {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  margin-bottom: 0.3rem;
}
.results-score {
  font-size: 3rem;
  font-weight: 900;
  font-family: 'Baloo 2', sans-serif;
  color: var(--gold-deep);
  margin: 0.5rem 0;
}
.results-msg { font-size: 1rem; font-weight: 600; color: #57534e; margin-bottom: 2rem; }
.quiz-replay-btn {
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  color: white;
  border: none;
  border-radius: 20px;
  padding: 0.9rem 2rem;
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.1rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 5px 0 #b45309;
  transition: all 0.15s;
}
.quiz-replay-btn:active { transform: translateY(2px); box-shadow: 0 3px 0 #b45309; }

/* Progress bar */
.quiz-progress {
  height: 8px;
  background: #e5e7eb;
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 1rem;
}
.quiz-progress-bar {
  height: 100%;
  background: linear-gradient(to right, #f59e0b, #ef4444);
  border-radius: 999px;
  transition: width 0.4s ease;
}

/* Stars trophy */
.trophy-stars { display: flex; justify-content: center; gap: 0.3rem; margin: 0.5rem 0; font-size: 2rem; }


/* ===== BARRE DE RECHERCHE ===== */
.search-bar-wrap { padding: 0.5rem 1rem 0; }
.search-input-wrap { position: relative; display: flex; align-items: center; }
.search-icon { position: absolute; left: 0.85rem; font-size: 1rem; pointer-events: none; opacity: 0.45; z-index:1; }
.search-input {
  width: 100%; padding: 0.6rem 2.4rem 0.6rem 2.3rem;
  border-radius: 999px; border: 2px solid #e5e7eb;
  font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 600;
  background: white; color: #1c1917; outline: none;
  box-shadow: 0 2px 0 rgba(0,0,0,0.06); transition: border-color 0.2s;
}
.search-input:focus { border-color: #f59e0b; }
.search-clear {
  position: absolute; right: 0.7rem;
  background: #d1d5db; border: none; width: 22px; height: 22px;
  border-radius: 50%; font-size: 0.75rem; cursor: pointer;
  display: none; align-items: center; justify-content: center; color: #374151;
}
.search-clear.visible { display: flex; }
.search-results-count { font-size: 0.75rem; color: #78716c; font-weight: 600; padding: 0.25rem 0.5rem 0; min-height: 1.3rem; }
.search-highlight { background: #fef08a; border-radius: 3px; padding: 0 1px; }
.no-search-results { text-align: center; padding: 2rem; color: #78716c; font-weight: 600; display: none; }
.no-search-results span { font-size: 2rem; display: block; margin-bottom: 0.4rem; }


/* ===== AJOUT PHOTO CARTE ===== */
.pharaoh-card { overflow: visible; }

.pharaoh-photo-thumb {
  width: 52px; height: 52px; border-radius: 12px;
  object-fit: cover; flex-shrink: 0;
  border: 2px solid var(--gold, #f59e0b);
  cursor: pointer;
  transition: transform 0.15s;
}
.pharaoh-photo-thumb:active { transform: scale(0.95); }

.pharaoh-add-photo {
  width: 52px; height: 52px; border-radius: 12px;
  border: 2px dashed #d1d5db; background: #f9fafb;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: all 0.2s; gap: 1px;
  font-size: 0; color: #9ca3af; font-weight: 700; font-family: 'Nunito', sans-serif;
}
.pharaoh-add-photo:hover, .pharaoh-add-photo:focus {
  border-color: #f59e0b; background: #fffbeb;
}
.pharaoh-add-photo .add-icon { font-size: 1.4rem; line-height: 1; }
.pharaoh-add-photo .add-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.05em; color: #9ca3af; }

/* Overlay photo plein écran */
.photo-viewer {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
  flex-direction: column; gap: 1rem; padding: 1rem;
}
.photo-viewer.active { display: flex; animation: fadeIn 0.2s ease; }
.photo-viewer img {
  max-width: 100%; max-height: 70vh; border-radius: 12px;
  object-fit: contain; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.photo-viewer-name {
  color: white; font-family: 'Baloo 2', sans-serif; font-size: 1.2rem; font-weight: 800;
  text-align: center;
}
.photo-viewer-actions { display: flex; gap: 0.8rem; }
.photo-viewer-btn {
  padding: 0.6rem 1.2rem; border-radius: 999px; border: none; cursor: pointer;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.9rem;
}

<div class="app">

  <header class="header">

    <h1>Les Pharaons d'Égypte</h1>

  </header>

  <nav class="tabs">
    <button class="tab-btn active" onclick="showTab('frise')" id="tab-frise">
      <span class="tab-icon">📜</span> Frise
    </button>
    <button class="tab-btn" onclick="showTab('quiz')" id="tab-quiz">
      <span class="tab-icon">🎯</span> Quiz
    </button>
  </nav>

  <!-- ÉCRAN FRISE -->
  <div class="screen active" id="screen-frise">
  <div class="search-bar-wrap" id="searchWrap" style="display:none;">
    <div class="search-input-wrap">

      <input type="search" class="search-input" id="searchInput" placeholder="Chercher un pharaon..." autocomplete="off" autocorrect="off" spellcheck="false">

    </div>
    <div class="search-results-count" id="searchCount"></div>
  </div>

    <div class="period-nav" id="periodNav"></div>
    <div id="dynastiesContainer"></div>
  </div>

  <!-- ÉCRAN QUIZ -->
  <div class="screen" id="screen-quiz">
    <div id="quizIntro" class="quiz-intro">
      <div style="font-size:4rem;margin-bottom:0.5rem;">🏆</div>
      <h2>Le Grand Quiz !</h2>
      <p>Réponds aux questions sur les pharaons.<br>Tu peux le faire ! 🌟</p>
      <button class="quiz-start-btn" onclick="startQuiz()">C'est parti ! 🚀</button>
    </div>

    <div id="quizGame" style="display:none;">
      <div class="quiz-progress"><div class="quiz-progress-bar" id="progressBar"></div></div>
      <div class="quiz-score-display">
        <div class="score-item">
          <div class="num" id="scoreGood">0</div>
          <div class="lbl">✅ Bonnes</div>
        </div>
        <div class="score-item">
          <div class="num" id="scoreQ">1</div>
          <div class="lbl">📋 Question</div>
        </div>
        <div class="score-item">
          <div class="num" id="scoreTotal">10</div>
          <div class="lbl">🎯 Total</div>
        </div>
      </div>

      <div class="quiz-question-wrap">
        <span class="quiz-type-badge" id="quizTypeBadge">QCM</span>
        <div class="quiz-question-img" id="questionImgWrap"></div>
        <div class="quiz-question-text" id="questionText"></div>
      </div>

      <div class="quiz-options" id="quizOptions"></div>

      <div class="quiz-feedback" id="quizFeedback">
        <div class="feedback-emoji" id="feedbackEmoji"></div>
        <div class="feedback-title" id="feedbackTitle"></div>
        <div class="feedback-text" id="feedbackText"></div>
      </div>

      <button class="quiz-next-btn" id="nextBtn" style="display:none;" onclick="nextQuestion()">

      </button>
    </div>

    <div id="quizResults" style="display:none;" class="quiz-results">
      <div class="results-emoji" id="resultsEmoji"></div>
      <div class="results-title" id="resultsTitle"></div>
      <div class="trophy-stars" id="trophyStars"></div>
      <div class="results-score" id="resultsScore"></div>
      <div class="results-msg" id="resultsMsg"></div>
      <button class="quiz-replay-btn" onclick="startQuiz()">Rejouer ! 🔄</button>
    </div>
  </div>

</div>

</div>

// CONSTRUCTION DE LA FRISE
// ============================================================

function buildFrise() {
  // Navigation par période
  const nav = document.getElementById('periodNav');
  PERIODS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'period-pill';
    btn.style.background = p.color;
    btn.textContent = p.emoji + ' ' + p.name;
    btn.onclick = () => document.getElementById('period-' + p.id).scrollIntoView({ behavior: 'smooth' });
    nav.appendChild(btn);
  });

  // Dynasties
  const container = document.getElementById('dynastiesContainer');
  PERIODS.forEach(p => {
    const periodDiv = document.createElement('div');
    periodDiv.id = 'period-' + p.id;

    p.dynasties.forEach((dyn, dIdx) => {
      const block = document.createElement('div');
      block.className = 'dynasty-block';
      block.style.setProperty('--dynasty-color', p.color);

      block.innerHTML = `
        <div class="dynasty-title">
          <div class="dynasty-emoji">${p.emoji}</div>
          <div class="dynasty-title-text">
            <h3>${dIdx === 0 ? p.name + ' — ' : ''}${dyn.name}</h3>
            <p>${dyn.years}</p>
          </div>
        </div>
        ${dIdx === 0 ? `<div class="dynasty-desc" style="border-color:${p.color}">${p.desc}</div>` : ''}
      `;

      const list = document.createElement('div');
      list.className = 'pharaohs-list';

      dyn.pharaohs.forEach(ph => {
        const card = document.createElement('button');
        card.className = 'pharaoh-card' + (ph.star ? ' star' : '');
        card.style.setProperty('--dynasty-color', p.color);
        card.innerHTML = `
          <div class="pharaoh-avatar">${ph.img ? `<img src="${ph.img}" alt="${ph.name}" referrerpolicy="no-referrer" onerror="this.parentNode.textContent='${ph.emoji}'">` : ph.emoji}</div>
          <div class="pharaoh-info">
            <h4>${ph.name}</h4>
            <div class="reign">${ph.years} · ${ph.duration}</div>
          </div>
          ${ph.star ? '<div class="star-badge">⭐</div>' : ''}
        `;
        card.onclick = () => openDetail(ph, p, dyn);
        list.appendChild(card);
      });

      block.appendChild(list);
      periodDiv.appendChild(block);
    });

    container.appendChild(periodDiv);
  });
}

function openDetail(ph, period, dyn) {
  const screen = document.getElementById('detailScreen');
  document.getElementById('detailName').textContent = ph.name;
  document.getElementById('detailDynasty').textContent = dyn.name;
  document.getElementById('detailBgEmoji').textContent = ph.emoji;

  const bgImg = document.getElementById('detailBgImg');
  if (ph.img) {
    bgImg.src = ph.img;
    bgImg.style.display = '';
  } else {
    bgImg.style.display = 'none';
  }

  document.getElementById('detailChips').innerHTML = `
    <div class="chip">📅 ${ph.years}</div>
    <div class="chip">⏱️ ${ph.duration}</div>
    ${ph.age !== '?' ? `<div class="chip">🎂 ${ph.age}</div>` : ''}
  `;
  document.getElementById('detailAnecdote').textContent = ph.anecdote;

  // Monument
  const monSection = document.getElementById('monumentSection');
  if (ph.monument) {
    monSection.style.display = '';
    const wrap = document.getElementById('monumentImgWrap');
    if (ph.monumentImg) {
      wrap.innerHTML = `<img src="${ph.monumentImg}" alt="${ph.monument}" referrerpolicy="no-referrer" onerror="this.parentNode.innerHTML='<div class=monument-emoji-fallback>${ph.monumentEmoji}</div>'">`;
    } else {
      wrap.innerHTML = `<div class="monument-emoji-fallback">${ph.monumentEmoji}</div>`;
    }
    document.getElementById('monumentCaption').textContent = ph.monument;
  } else {
    monSection.style.display = 'none';
  }

  screen.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailScreen').classList.remove('active');
  document.body.style.overflow = '';
}

let quizQuestions = [];
let currentQ = 0;
let score = 0;
const TOTAL = 10;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function startQuiz() {
  quizQuestions = shuffle(QUIZ_QUESTIONS).slice(0, TOTAL);
  currentQ = 0;
  score = 0;
  document.getElementById('quizIntro').style.display = 'none';
  document.getElementById('quizResults').style.display = 'none';
  document.getElementById('quizGame').style.display = 'block';
  document.getElementById('scoreTotal').textContent = TOTAL;
  showQuestion();
}

function showQuestion() {
  const q = quizQuestions[currentQ];
  document.getElementById('scoreQ').textContent = currentQ + 1;
  document.getElementById('scoreGood').textContent = score;
  document.getElementById('progressBar').style.width = ((currentQ / TOTAL) * 100) + '%';
  document.getElementById('quizFeedback').classList.remove('show');
  document.getElementById('nextBtn').style.display = 'none';

  // Badge type
  document.getElementById('quizTypeBadge').textContent = q.type === 'monument' ? '🏛️ Monument' : '🤔 Qui suis-je ?';

  // Image
  const imgWrap = document.getElementById('questionImgWrap');
  if (q.img) {
    imgWrap.style.display = '';
    imgWrap.innerHTML = `<img src="${q.img}" alt="" style="width:100%;border-radius:16px;" referrerpolicy="no-referrer" onerror="this.parentNode.innerHTML='<div class=quiz-question-emoji>🏺</div>'">`;
  } else {
    imgWrap.style.display = 'none';
    imgWrap.innerHTML = '';
  }

  document.getElementById('questionText').textContent = q.question;

  // Options
  const opts = document.getElementById('quizOptions');
  opts.innerHTML = '';
  const shuffled = shuffle(q.options);
  shuffled.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.onclick = () => answerQuestion(opt, q);
    opts.appendChild(btn);
  });
}

function answerQuestion(chosen, q) {
  // Désactiver tous les boutons
  document.querySelectorAll('.quiz-option').forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === q.correct) btn.classList.add('correct');
    else if (btn.textContent === chosen && chosen !== q.correct) btn.classList.add('wrong');
  });

  const isCorrect = chosen === q.correct;
  if (isCorrect) score++;

  // Feedback
  const fb = document.getElementById('quizFeedback');
  document.getElementById('feedbackEmoji').textContent = isCorrect ? '🎉' : '😅';
  document.getElementById('feedbackTitle').textContent = isCorrect ? 'Bravo, c\'est exact !' : 'Pas tout à fait...';
  document.getElementById('feedbackTitle').style.color = isCorrect ? '#166534' : '#991b1b';
  document.getElementById('feedbackText').textContent = q.feedback;
  fb.classList.add('show');

  document.getElementById('nextBtn').style.display = 'block';
  document.getElementById('nextBtn').textContent = currentQ + 1 < TOTAL ? 'Question suivante ➡️' : 'Voir mon score ! 🏆';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= TOTAL) {
    showResults();
  } else {
    showQuestion();
  }
}

function showResults() {
  document.getElementById('quizGame').style.display = 'none';
  const res = document.getElementById('quizResults');
  res.style.display = 'block';

  const pct = score / TOTAL;
  let emoji, title, msg, stars;

  if (pct === 1) {
    emoji = '🏆'; title = 'Parfait !'; stars = '⭐⭐⭐';
    msg = 'Tu connais les pharaons mieux qu\'un vrai égyptologue !';
  } else if (pct >= 0.7) {
    emoji = '🎉'; title = 'Excellent !'; stars = '⭐⭐';
    msg = 'Tu es un(e) vrai(e) explorateur(trice) de l\'Égypte ancienne !';
  } else if (pct >= 0.4) {
    emoji = '😊'; title = 'Bien joué !'; stars = '⭐';
    msg = 'Tu progresses ! Lis encore la frise et retente ta chance !';
  } else {
    emoji = '📚'; title = 'Continue !'; stars = '🌟';
    msg = 'Explore encore la frise pour apprendre plein de choses !';
  }

  document.getElementById('resultsEmoji').textContent = emoji;
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('trophyStars').textContent = stars;
  document.getElementById('resultsScore').textContent = score + ' / ' + TOTAL;
  document.getElementById('resultsMsg').textContent = msg;
}

// ===== RECHERCHE APPROXIMATIVE =====

function normalizeStr(s) {
  return (s || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9 ]/g, ' ').trim();
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n; if (n === 0) return m;
  const dp = [];
  for (let i = 0; i <= m; i++) { dp[i] = [i]; }
  for (let j = 0; j <= n; j++) { dp[0][j] = j; }
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] :
        1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function matchScore(query, text) {
  const q = normalizeStr(query);
  const t = normalizeStr(text);
  if (!q) return 1;
  if (t.includes(q)) return 1;
  const words = q.split(' ').filter(w => w.length >= 2);
  if (words.length === 0) return 0;
  let total = 0;
  for (const word of words) {
    if (t.includes(word)) { total += 1; continue; }
    const tWords = t.split(' ').filter(Boolean);
    let best = Infinity;
    for (const tw of tWords) {
      if (Math.abs(tw.length - word.length) > 3) continue;
      best = Math.min(best, levenshtein(word, tw));
    }
    const tol = word.length <= 4 ? 1 : word.length <= 7 ? 2 : 3;
    if (best <= tol) total += Math.max(0, 1 - best / word.length);
  }
  return total / words.length;
}

function highlightName(name, query) {
  if (!query.trim()) return name;
  const words = normalizeStr(query).split(' ').filter(w => w.length >= 2);
  let result = name;
  for (const word of words) {
    const re = new RegExp('(' + word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    result = result.replace(re, '<mark class="search-highlight">$1</mark>');
  }
  return result;
}

function runSearch(query) {
  const q = query.trim();
  const cards = document.querySelectorAll('.pharaoh-card');
  const blocks = document.querySelectorAll('.dynasty-block');
  const noRes = document.getElementById('noResults');
  const countEl = document.getElementById('searchCount');
  document.getElementById('noResultsQuery').textContent = '"' + q + '"';

  if (!q) {
    cards.forEach(c => { c.style.display = ''; });
    blocks.forEach(b => { b.style.display = ''; });
    noRes.style.display = 'none';
    countEl.textContent = '';
    // Restaurer les noms
    document.querySelectorAll('.pharaoh-info h4').forEach(el => {
      el.textContent = el.dataset.original || el.textContent;
    });
    return;
  }

  let shown = 0;
  // Construire une liste plate de toutes les données
  const allData = [];
  PERIODS.forEach(p => p.dynasties.forEach(d => d.pharaohs.forEach(ph => {
    allData.push({ name: ph.name, anecdote: ph.anecdote });
  })));

  let dataIdx = 0;
  cards.forEach(card => {
    const nameEl = card.querySelector('.pharaoh-info h4');
    if (!nameEl.dataset.original) nameEl.dataset.original = nameEl.textContent;
    const name = nameEl.dataset.original;
    const reign = (card.querySelector('.reign') || {}).textContent || '';
    const ph = allData[dataIdx++] || {};
    const searchText = name + ' ' + reign + ' ' + (ph.anecdote || '');
    const score = matchScore(q, searchText);

    if (score >= 0.35) {
      card.style.display = '';
      nameEl.innerHTML = highlightName(name, q);
      shown++;
    } else {
      card.style.display = 'none';
    }
  });

  // Masquer les blocs vides
  blocks.forEach(block => {
    const visible = [...block.querySelectorAll('.pharaoh-card')].some(c => c.style.display !== 'none');
    block.style.display = visible ? '' : 'none';
  });

  if (shown === 0) {
    noRes.style.display = 'block';
    countEl.textContent = '';
  } else {
    noRes.style.display = 'none';
    countEl.textContent = shown + ' pharaon' + (shown > 1 ? 's' : '') + ' trouvé' + (shown > 1 ? 's' : '');
  }
}

function clearSearch() {
  const input = document.getElementById('searchInput');
  if (input) {
    input.value = '';
    document.getElementById('searchClear').classList.remove('visible');
    runSearch('');
    document.getElementById('searchCount').textContent = '';
  }
}

function initSearch() {
  const input = document.getElementById('searchInput');
  const clearBtn = document.getElementById('searchClear');
  if (!input) return;

  // Afficher la barre dès le départ
  document.getElementById('searchWrap').style.display = 'block';

  let debounceTimer;
  input.addEventListener('input', () => {
    clearBtn.classList.toggle('visible', input.value.length > 0);
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => runSearch(input.value), 200);
  });
  clearBtn.addEventListener('click', () => { input.value = ''; clearBtn.classList.remove('visible'); runSearch(''); input.focus(); });
}



// ===== GESTION PHOTOS PAR PHARAON =====

const PHOTO_PREFIX = 'pharaon_photo_';
let currentPhotoKey = null;
let currentPhotoCardEl = null;

// Charger une photo depuis localStorage
function getStoredPhoto(key) {
  try { return localStorage.getItem(PHOTO_PREFIX + key); } catch(e) { return null; }
}

// Sauvegarder
function storePhoto(key, dataUrl) {
  try { localStorage.setItem(PHOTO_PREFIX + key, dataUrl); return true; }
  catch(e) {
    // localStorage plein (5MB) : nettoyer les plus vieilles
    try {
      const keys = Object.keys(localStorage).filter(k => k.startsWith(PHOTO_PREFIX));
      if (keys.length > 0) { localStorage.removeItem(keys[0]); }
      localStorage.setItem(PHOTO_PREFIX + key, dataUrl);
      return true;
    } catch(e2) { return false; }
  }
}

function deleteStoredPhoto(key) {
  try { localStorage.removeItem(PHOTO_PREFIX + key); } catch(e) {}
}

// Compresser une image avant stockage
function compressImage(file, maxW, quality, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const scale = Math.min(1, maxW / Math.max(img.width, img.height));
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      cb(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Créer un slug unique pour chaque pharaon
function pharaohKey(name) {
  return name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'_');
}

// Mettre à jour l'avatar d'une carte avec la photo stockée
function applyStoredPhotos() {
  document.querySelectorAll('.pharaoh-card').forEach(card => {
    const nameEl = card.querySelector('.pharaoh-info h4');
    if (!nameEl) return;
    const name = nameEl.dataset.original || nameEl.textContent;
    const key = pharaohKey(name);
    const stored = getStoredPhoto(key);
    const avatarEl = card.querySelector('.pharaoh-avatar');
    if (!avatarEl) return;
    if (stored) {
      avatarEl.innerHTML = '';
      const img = document.createElement('img');
      img.src = stored;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:12px;cursor:pointer;';
      img.onclick = (e) => { e.stopPropagation(); openPhotoViewer(key, name, stored, card); };
      avatarEl.appendChild(img);
      avatarEl.style.border = '2px solid #f59e0b';
    } else {
      // Bouton ajout photo
      avatarEl.innerHTML = '';
      avatarEl.style.border = '';
      const btn = document.createElement('button');
      btn.className = 'pharaoh-add-photo';
      btn.setAttribute('aria-label', 'Ajouter une photo de ' + name);
      btn.innerHTML = '<span class="add-icon">📷</span><span class="add-label">Photo</span>';
      btn.onclick = (e) => { e.stopPropagation(); triggerPhotoUpload(key, name, card); };
      avatarEl.appendChild(btn);
    }
  });
}

function triggerPhotoUpload(key, name, cardEl) {
  currentPhotoKey = key;
  currentPhotoCardEl = cardEl;
  const input = document.getElementById('photoFileInput');
  input.value = '';
  input.onchange = null;
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    compressImage(file, 400, 0.78, (dataUrl) => {
      const ok = storePhoto(key, dataUrl);
      if (!ok) { alert('Espace insuffisant. Essaie de supprimer d'autres photos.'); return; }
      applyStoredPhotos();
    });
  };
  input.click();
}

function openPhotoViewer(key, name, src, cardEl) {
  currentPhotoKey = key;
  currentPhotoCardEl = cardEl;
  document.getElementById('photoViewerName').textContent = name;
  document.getElementById('photoViewerImg').src = src;
  document.getElementById('photoViewer').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closePhotoViewer() {
  document.getElementById('photoViewer').classList.remove('active');
  document.body.style.overflow = '';
  currentPhotoKey = null;
  currentPhotoCardEl = null;
}

function triggerPhotoChange() {
  closePhotoViewer();
  setTimeout(() => {
    if (currentPhotoKey) {
      const nameEl = currentPhotoCardEl && currentPhotoCardEl.querySelector('.pharaoh-info h4');
      const name = nameEl ? (nameEl.dataset.original || nameEl.textContent) : '';
      triggerPhotoUpload(currentPhotoKey, name, currentPhotoCardEl);
    }
  }, 300);
}

function deletePhoto() {
  if (!currentPhotoKey) return;
  if (!confirm('Supprimer cette photo ?')) return;
  deleteStoredPhoto(currentPhotoKey);
  closePhotoViewer();
  applyStoredPhotos();
}

// Fermer le viewer en cliquant hors de l'image
document.addEventListener('click', e => {
  const viewer = document.getElementById('photoViewer');
  if (viewer && viewer.classList.contains('active') && e.target === viewer) closePhotoViewer();
});

// Init
buildFrise();
initSearch();
applyStoredPhotos();
initSearch();
</script>

  <img id="photoViewerImg" src="" alt="">
  <div class="photo-viewer-actions">
    <button class="photo-viewer-btn change" onclick="triggerPhotoChange()">🔄 Changer</button>
    <button class="photo-viewer-btn delete" onclick="deletePhoto()">🗑️ Supprimer</button>
    <button class="photo-viewer-btn close" onclick="closePhotoViewer()">✕ Fermer</button>
  </div>
</div>
